<!DOCTYPE html>                                                                               
  <html lang="en">                                                                            
  <head>                                                                                        
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">                    
      <title>Analog Clock</title>                                                             
      <style>
          * {
              margin: 0;
              padding: 0;
              box-sizing: border-box;
          }

          body {
              background: white;
              display: flex;
              justify-content: center;
              align-items: center;
              min-height: 100vh;
              font-family: Arial, sans-serif;
          }

          .clock {
              width: 90vmin;
              height: 90vmin;
              max-width: 400px;
              max-height: 400px;
              border: 8px solid #333;
              border-radius: 50%;
              position: relative;
              box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
          }

          .clock::after {
              content: '';
              position: absolute;
              width: 4%;
              height: 4%;
              background: #333;
              border-radius: 50%;
              top: 50%;
              left: 50%;
              transform: translate(-50%, -50%);
              z-index: 10;
          }

          .number {
              position: absolute;
              width: 100%;
              height: 100%;
              text-align: center;
              font-size: 1.5em;
              font-weight: bold;
              color: #333;
          }

          .number span {
              display: inline-block;
              position: absolute;
              left: 50%;
              transform: translateX(-50%);
              top: 8%;
          }

          .number:nth-child(1) { transform: rotate(0deg); }
          .number:nth-child(1) span { transform: translateX(-50%) rotate(0deg); }

          .number:nth-child(2) { transform: rotate(30deg); }
          .number:nth-child(2) span { transform: translateX(-50%) rotate(-30deg); }

          .number:nth-child(3) { transform: rotate(60deg); }
          .number:nth-child(3) span { transform: translateX(-50%) rotate(-60deg); }

          .number:nth-child(4) { transform: rotate(90deg); }
          .number:nth-child(4) span { transform: translateX(-50%) rotate(-90deg); }

          .number:nth-child(5) { transform: rotate(120deg); }
          .number:nth-child(5) span { transform: translateX(-50%) rotate(-120deg); }

          .number:nth-child(6) { transform: rotate(150deg); }
          .number:nth-child(6) span { transform: translateX(-50%) rotate(-150deg); }

          .number:nth-child(7) { transform: rotate(180deg); }
          .number:nth-child(7) span { transform: translateX(-50%) rotate(-180deg); }

          .number:nth-child(8) { transform: rotate(210deg); }
          .number:nth-child(8) span { transform: translateX(-50%) rotate(-210deg); }

          .number:nth-child(9) { transform: rotate(240deg); }
          .number:nth-child(9) span { transform: translateX(-50%) rotate(-240deg); }

          .number:nth-child(10) { transform: rotate(270deg); }
          .number:nth-child(10) span { transform: translateX(-50%) rotate(-270deg); }

          .number:nth-child(11) { transform: rotate(300deg); }
          .number:nth-child(11) span { transform: translateX(-50%) rotate(-300deg); }

          .number:nth-child(12) { transform: rotate(330deg); }
          .number:nth-child(12) span { transform: translateX(-50%) rotate(-330deg); }

          .hand {
              position: absolute;
              bottom: 50%;
              left: 50%;
              transform-origin: bottom center;
              background: #333;
              border-radius: 10px;
          }

          .hour {
              width: 3%;
              height: 25%;
              transform: translateX(-50%) rotate(0deg);
          }

          .minute {
              width: 2.5%;
              height: 35%;
              transform: translateX(-50%) rotate(0deg);
          }

          .second {
              width: 1.5%;
              height: 40%;
              background: #e74c3c;
              transform: translateX(-50%) rotate(0deg);
              animation: tick 60s infinite steps(60);
          }

          @keyframes tick {
              to {
                  transform: translateX(-50%) rotate(360deg);
              }
          }

          @media (max-width: 500px) {
              .number {
                  font-size: 1.2em;
              }
          }
      </style>
  </head>
  <body>
      <div class="clock">
          <div class="number"><span>12</span></div>
          <div class="number"><span>1</span></div>
          <div class="number"><span>2</span></div>
          <div class="number"><span>3</span></div>
          <div class="number"><span>4</span></div>
          <div class="number"><span>5</span></div>
          <div class="number"><span>6</span></div>
          <div class="number"><span>7</span></div>
          <div class="number"><span>8</span></div>
          <div class="number"><span>9</span></div>
          <div class="number"><span>10</span></div>
          <div class="number"><span>11</span></div>
          <div class="hand hour"></div>
          <div class="hand minute"></div>
          <div class="hand second"></div>
      </div>

      <script>
          function setClock() {
              const now = new Date();
              const hours = now.getHours() % 12;
              const minutes = now.getMinutes();
              const seconds = now.getSeconds();

              const hourDeg = (hours * 30) + (minutes * 0.5);
              const minuteDeg = (minutes * 6) + (seconds * 0.1);
              const secondDeg = seconds * 6;

              document.querySelector('.hour').style.transform = `translateX(-50%)
  rotate(${hourDeg}deg)`;
              document.querySelector('.minute').style.transform = `translateX(-50%)
  rotate(${minuteDeg}deg)`;
              document.querySelector('.second').style.transform = `translateX(-50%)
  rotate(${secondDeg}deg)`;
          }

          setClock();
          setInterval(setClock, 1000);
      </script>
  </body>
  </html>
